<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Surgical Portfolio — SurgeLog</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=DM+Serif+Display&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0c10;--surface:#111318;--surface2:#181c24;
  --border:#22283a;--border2:#2e3650;
  --accent:#4f8ef7;--accent-dim:#1e3a6e;--accent-glow:rgba(79,142,247,0.15);
  --green:#22c55e;--green-dim:#14532d;
  --amber:#f59e0b;
  --text:#e8eaf0;--text-mid:#8892aa;--text-dim:#4a5168;
  --serif:'DM Serif Display',Georgia,serif;
  --font:'Inter',system-ui,sans-serif;
  --mono:'JetBrains Mono','Fira Code',monospace;
}
body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;min-height:100vh}

/* TOPBAR */
.topbar{
  background:var(--surface);border-bottom:1px solid var(--border);
  padding:0 5vw;height:54px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:50;
}
.logo{font-family:var(--serif);font-size:17px;color:var(--text)}
.logo span{color:var(--accent)}
.topbar-actions{display:flex;align-items:center;gap:8px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:6px;font-family:var(--font);font-size:12px;font-weight:600;cursor:pointer;border:none;transition:all .15s;text-decoration:none}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:#3d7de8}
.btn-secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border)}
.btn-secondary:hover{border-color:var(--border2)}

/* HERO / PROFILE */
.profile-hero{
  border-bottom:1px solid var(--border);
  padding:40px 5vw;
  max-width:1100px;margin:0 auto;
}
.profile-top{display:flex;align-items:flex-start;gap:20px;flex-wrap:wrap}
.profile-avatar{
  width:64px;height:64px;border-radius:50%;flex-shrink:0;
  background:var(--accent-dim);display:flex;align-items:center;justify-content:center;
  font-size:22px;font-weight:800;color:var(--accent);
}
.profile-info{flex:1}
.profile-name{font-family:var(--serif);font-size:28px;line-height:1.2;margin-bottom:6px}
.profile-spec{font-size:14px;color:var(--text-mid);margin-bottom:8px}
.profile-reg{font-size:12px;color:var(--text-dim);font-family:var(--mono)}
.profile-bio{font-size:14px;color:var(--text-mid);margin-top:12px;line-height:1.65;max-width:600px}

.profile-stats{display:flex;gap:32px;margin-top:24px;flex-wrap:wrap}
.pstat{text-align:left}
.pstat-num{font-family:var(--serif);font-size:26px;color:var(--text)}
.pstat-lbl{font-size:11px;color:var(--text-dim);margin-top:2px}

/* FILTERS */
.filters-bar{
  padding:16px 5vw;border-bottom:1px solid var(--border);
  display:flex;gap:10px;flex-wrap:wrap;align-items:center;
  max-width:1100px;margin:0 auto;
}
.filter-input{
  background:var(--surface);border:1px solid var(--border);border-radius:7px;
  color:var(--text);font-family:var(--font);font-size:13px;padding:7px 12px;
  outline:none;transition:border-color .15s;
}
.filter-input:focus{border-color:var(--accent)}
.filter-count{font-size:12px;color:var(--text-dim);margin-left:auto}

/* PROCEDURES GRID */
.procs-wrap{max-width:1100px;margin:0 auto;padding:24px 5vw 60px}
.proc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:14px}

.proc-card{
  background:var(--surface);border:1px solid var(--border);border-radius:10px;
  padding:18px;cursor:pointer;transition:border-color .15s,box-shadow .15s;
}
.proc-card:hover{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent-dim)}
.proc-card-hdr{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:10px}
.proc-card-name{font-size:14px;font-weight:700;line-height:1.3}
.proc-card-date{font-size:11px;color:var(--text-dim);margin-top:3px}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;flex-shrink:0}
.badge-v{background:var(--green-dim);color:var(--green)}
.badge-u{background:var(--surface2);color:var(--text-dim)}
.proc-card-meta{display:flex;gap:10px;flex-wrap:wrap;margin-top:8px}
.meta-chip{font-size:11px;color:var(--text-mid)}
.meta-chip span{color:var(--text-dim)}
.proc-card-codes{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}
.code-tag{font-family:var(--mono);font-size:10px;background:var(--bg);border:1px solid var(--border);border-radius:4px;padding:2px 6px;color:var(--text-dim)}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:500;display:none;align-items:center;justify-content:center;padding:20px}
.modal-overlay.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--border2);border-radius:14px;width:580px;max-width:100%;max-height:88vh;overflow-y:auto;padding:28px;position:relative}
.modal-close{position:absolute;top:14px;right:14px;background:none;border:none;cursor:pointer;color:var(--text-dim);font-size:18px;line-height:1}
.modal-close:hover{color:var(--text)}
.modal-title{font-size:18px;font-weight:800;margin-bottom:4px}
.modal-sub{font-size:12px;color:var(--text-dim);margin-bottom:16px}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.d-lbl{font-size:10px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.05em;font-weight:600;margin-bottom:3px}
.d-val{font-size:13px;color:var(--text)}
hr.rule{border:none;border-top:1px solid var(--border);margin:18px 0}

/* Empty / Loading */
.empty{padding:60px 20px;text-align:center;color:var(--text-dim);font-size:14px;grid-column:1/-1}
.empty-icon{font-size:36px;margin-bottom:12px}
.spinner{width:32px;height:32px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite;margin:60px auto}
@keyframes spin{to{transform:rotate(360deg)}}

/* Not found */
.not-found{min-height:60vh;display:flex;align-items:center;justify-content:center;flex-direction:column;text-align:center;padding:40px;gap:12px}
.not-found-icon{font-size:48px}
.not-found-title{font-family:var(--serif);font-size:28px}
.not-found-sub{font-size:14px;color:var(--text-mid);max-width:400px;line-height:1.6}

/* Scrollbar */
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

@media(max-width:600px){
  .profile-stats{gap:20px}
  .detail-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">SurgeLog</div>
  <div class="topbar-actions">
    <a href="index.html" class="btn btn-secondary">About</a>
    <a href="app.html#signup" class="btn btn-primary">Create your logbook</a>
  </div>
</div>

<div id="loading"><div class="spinner"></div></div>
<div id="not-found" style="display:none">
  <div class="not-found">
    <div class="not-found-icon">🔍</div>
    <div class="not-found-title">Portfolio not found</div>
    <div class="not-found-sub">This portfolio may be private or the link may be incorrect. Ask the surgeon to share their link directly.</div>
    <a href="app.html#signup" class="btn btn-primary" style="margin-top:8px">Create your own logbook</a>
  </div>
</div>

<div id="portfolio-content" style="display:none">
  <!-- Profile hero -->
  <div class="profile-hero">
    <div class="profile-top">
      <div class="profile-avatar" id="pf-avatar">?</div>
      <div class="profile-info">
        <div class="profile-name" id="pf-name">—</div>
        <div class="profile-spec" id="pf-spec"></div>
        <div class="profile-reg" id="pf-reg"></div>
        <div class="profile-bio" id="pf-bio"></div>
      </div>
    </div>
    <div class="profile-stats">
      <div class="pstat"><div class="pstat-num" id="pf-total">—</div><div class="pstat-lbl">Total procedures</div></div>
      <div class="pstat"><div class="pstat-num" style="color:var(--green)" id="pf-verified">—</div><div class="pstat-lbl">Verified</div></div>
      <div class="pstat"><div class="pstat-num" id="pf-institutions">—</div><div class="pstat-lbl">Institutions</div></div>
    </div>
  </div>

  <!-- Filters -->
  <div class="filters-bar">
    <input class="filter-input" type="text" placeholder="Search procedures..." style="width:200px" oninput="applyFilters()">
    <select class="filter-input" style="width:150px" onchange="applyFilters()">
      <option value="">All approaches</option>
      <option>Open</option>
      <option>Laparoscopic</option>
      <option>Robotic</option>
      <option>Endoscopic</option>
    </select>
    <select class="filter-input" style="width:140px" onchange="applyFilters()">
      <option value="">All status</option>
      <option value="verified">Verified only</option>
    </select>
    <div class="filter-count" id="filter-count"></div>
  </div>

  <!-- Procedures -->
  <div class="procs-wrap">
    <div class="proc-grid" id="proc-grid"></div>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal" onclick="closeModal(event)">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div id="modal-body"></div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://owczgkqqfyrcujvvkhib.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im93Y3pna3FxZnlyY3VqdnZraGliIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI0NTIzNjEsImV4cCI6MjA5ODAyODM2MX0.5TMWjsv0aHwJslxJAbc4f2-XXStTAD0OVVg6wUyaT5c';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

let allProcs = [];
const surgeonId = new URLSearchParams(location.search).get('id');

document.addEventListener('DOMContentLoaded', async () => {
  if (!surgeonId) { showNotFound(); return; }

  // Fetch profile
  const { data: profile, error: profErr } = await sb
    .from('profiles')
    .select('*')
    .eq('id', surgeonId)
    .eq('portfolio_public', true)
    .single();

  if (profErr || !profile) { showNotFound(); return; }

  // Fetch procedures (public: no private_notes, only show non-private ones)
  const { data: procs, error: procErr } = await sb
    .from('procedures')
    .select('id,procedure_name,date,approach,role,outcome,asa_grade,duration_minutes,anaesthesia_type,wound_class,icd10_code,icd10_description,cpt_code,cpt_description,verified,verified_at,verified_by,institution_name_freetext,reflective_notes,teaching_case,confidence_score')
    .eq('surgeon_id', surgeonId)
    .order('date', { ascending: false });

  if (procErr) { showNotFound(); return; }

  allProcs = procs || [];
  renderProfile(profile);
  renderProcs(allProcs);
  document.getElementById('loading').style.display = 'none';
  document.getElementById('portfolio-content').style.display = 'block';

  // Update page title
  document.title = `${profile.full_name} — Surgical Portfolio`;
});

function renderProfile(p) {
  const initials = p.full_name.split(' ').map(w => w[0]).join('').slice(0,2).toUpperCase();
  document.getElementById('pf-avatar').textContent = initials;
  document.getElementById('pf-name').textContent = p.full_name;
  document.getElementById('pf-spec').textContent = p.specialty || '';

  const regParts = [];
  if (p.registration_number) regParts.push(p.registration_number);
  if (p.registration_body) regParts.push(p.registration_body);
  document.getElementById('pf-reg').textContent = regParts.join(' · ');

  if (p.bio) document.getElementById('pf-bio').textContent = p.bio;

  const verified = allProcs.filter(x => x.verified).length;
  const institutions = new Set(allProcs.map(x => x.institution_name_freetext).filter(Boolean)).size;
  document.getElementById('pf-total').textContent = allProcs.length;
  document.getElementById('pf-verified').textContent = verified;
  document.getElementById('pf-institutions').textContent = institutions || '—';
}

function renderProcs(procs) {
  const grid = document.getElementById('proc-grid');
  document.getElementById('filter-count').textContent = `${procs.length} procedure${procs.length !== 1 ? 's' : ''}`;

  if (!procs.length) {
    grid.innerHTML = `<div class="empty"><div class="empty-icon">📋</div>No procedures match your filters.</div>`;
    return;
  }

  grid.innerHTML = procs.map(p => `
    <div class="proc-card" onclick="openModal('${p.id}')">
      <div class="proc-card-hdr">
        <div>
          <div class="proc-card-name">${p.procedure_name}</div>
          <div class="proc-card-date">${fmtDate(p.date)}${p.institution_name_freetext ? ' · ' + p.institution_name_freetext : ''}</div>
        </div>
        <span class="badge ${p.verified ? 'badge-v' : 'badge-u'}">${p.verified ? '✓ Verified' : 'Unverified'}</span>
      </div>
      <div class="proc-card-meta">
        ${p.approach ? `<div class="meta-chip"><span>Approach</span> ${p.approach}</div>` : ''}
        ${p.role ? `<div class="meta-chip"><span>Role</span> ${p.role}</div>` : ''}
        ${p.duration_minutes ? `<div class="meta-chip"><span>Duration</span> ${p.duration_minutes}min</div>` : ''}
        ${p.outcome ? `<div class="meta-chip"><span>Outcome</span> ${p.outcome}</div>` : ''}
      </div>
      <div class="proc-card-codes">
        ${p.icd10_code ? `<span class="code-tag">ICD ${p.icd10_code}</span>` : ''}
        ${p.cpt_code ? `<span class="code-tag">CPT ${p.cpt_code}</span>` : ''}
      </div>
    </div>`).join('');
}

function applyFilters() {
  const inputs = document.querySelectorAll('.filter-input');
  const text = inputs[0].value.toLowerCase();
  const approach = inputs[1].value;
  const status = inputs[2].value;

  let filtered = allProcs;
  if (text) filtered = filtered.filter(p => p.procedure_name.toLowerCase().includes(text));
  if (approach) filtered = filtered.filter(p => p.approach === approach);
  if (status === 'verified') filtered = filtered.filter(p => p.verified);

  renderProcs(filtered);
}

function openModal(id) {
  const p = allProcs.find(x => x.id === id);
  if (!p) return;
  document.getElementById('modal-body').innerHTML = `
    <div class="modal-title">${p.procedure_name}</div>
    <div class="modal-sub">${fmtDate(p.date)}${p.institution_name_freetext ? ' · ' + p.institution_name_freetext : ''}</div>
    <div style="margin-bottom:16px">
      <span class="badge ${p.verified ? 'badge-v' : 'badge-u'}">${p.verified ? '✓ Verified' : 'Unverified'}</span>
      ${p.verified && p.verified_by ? `<span style="font-size:11px;color:var(--text-dim);margin-left:10px">Counter-signed by ${p.verified_by}</span>` : ''}
    </div>
    <hr class="rule">
    <div class="detail-grid">
      <div><div class="d-lbl">Approach</div><div class="d-val">${p.approach || '—'}</div></div>
      <div><div class="d-lbl">Surgeon Role</div><div class="d-val">${p.role || '—'}</div></div>
      <div><div class="d-lbl">ASA Grade</div><div class="d-val">${p.asa_grade || '—'}</div></div>
      <div><div class="d-lbl">Outcome</div><div class="d-val">${p.outcome || '—'}</div></div>
      <div><div class="d-lbl">Duration</div><div class="d-val">${p.duration_minutes ? p.duration_minutes + ' min' : '—'}</div></div>
      <div><div class="d-lbl">Anaesthesia</div><div class="d-val">${p.anaesthesia_type || '—'}</div></div>
      <div><div class="d-lbl">Wound Class</div><div class="d-val">${p.wound_class || '—'}</div></div>
      <div><div class="d-lbl">Teaching Case</div><div class="d-val">${p.teaching_case ? 'Yes' : 'No'}</div></div>
    </div>
    ${p.icd10_code || p.cpt_code ? `
    <hr class="rule">
    <div class="detail-grid">
      ${p.icd10_code ? `<div><div class="d-lbl">ICD-10</div><div class="d-val" style="font-family:var(--mono)">${p.icd10_code} <span style="font-family:var(--font);font-size:11px;color:var(--text-dim)">${p.icd10_description || ''}</span></div></div>` : ''}
      ${p.cpt_code ? `<div><div class="d-lbl">CPT</div><div class="d-val" style="font-family:var(--mono)">${p.cpt_code} <span style="font-family:var(--font);font-size:11px;color:var(--text-dim)">${p.cpt_description || ''}</span></div></div>` : ''}
    </div>` : ''}
    ${p.reflective_notes ? `<hr class="rule"><div><div class="d-lbl" style="margin-bottom:8px">Reflective Notes</div><div style="font-size:13px;color:var(--text-mid);line-height:1.65;background:var(--surface2);border-radius:7px;padding:12px">${p.reflective_notes}</div></div>` : ''}`;

  document.getElementById('modal').classList.add('open');
}

function closeModal(e) {
  if (!e || e.target === document.getElementById('modal')) document.getElementById('modal').classList.remove('open');
}

function showNotFound() {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('not-found').style.display = 'block';
}

function fmtDate(d) {
  if (!d) return '—';
  return new Date(d + 'T00:00:00').toLocaleDateString('en-GB', {day:'2-digit', month:'short', year:'numeric'});
}
</script>
</body>
</html>
